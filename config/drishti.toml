[daemon]
pid_file = "/var/run/drishti.pid"
log_level = "info"
metrics_addr = "0.0.0.0:9090"

[collectors]
cpu = true

[collectors.process]
enabled = true
track_threads = false

[collectors.memory]
enabled = true
poll_interval_ms = 1000
track_oom = true

[filters]
exclude_pids = [1, 2]
exclude_comms = ["kworker"]
include_comms = []

[export]
scrape_interval_ms = 1000
max_series = 10000
