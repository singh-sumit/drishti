name: qemu-ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture lane to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64
          - aarch64

permissions:
  contents: read

jobs:
  qemu-x86_64:
    if: github.event_name != 'workflow_dispatch' || inputs.arch == 'all' || inputs.arch == 'x86_64'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build and QEMU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm cpio gzip file clang llvm lld
      - name: Install nightly rust-src
        run: rustup toolchain install nightly --profile minimal --component rust-src
      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker
      - name: Run x86_64 QEMU CI lane
        run: cargo run -p xtask -- qemu ci --arch x86_64 --kvm auto --timeout-secs 240
      - name: Upload x86_64 QEMU artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-x86_64-artifacts
          path: target/qemu/x86_64/

  qemu-aarch64:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' || inputs.arch == 'aarch64'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build and QEMU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm cpio gzip file clang llvm lld
      - name: Install nightly rust-src
        run: rustup toolchain install nightly --profile minimal --component rust-src
      - name: Install bpf-linker and cross
        run: |
          cargo +nightly install bpf-linker
          cargo install cross --locked
      - name: Fetch arm64 kernel package
        run: |
          set -euo pipefail

          APT_ROOT="$RUNNER_TEMP/apt-arm64"
          mkdir -p "$APT_ROOT/etc/apt" "$APT_ROOT/state/lists/partial" "$APT_ROOT/cache/archives/partial"

          cat > "$APT_ROOT/etc/apt/sources.list" <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          APT_OPTS=(
            -o "Dir::Etc::sourcelist=$APT_ROOT/etc/apt/sources.list"
            -o "Dir::Etc::sourceparts=-"
            -o "APT::Get::List-Cleanup=0"
            -o "Dir::State=$APT_ROOT/state"
            -o "Dir::State::lists=$APT_ROOT/state/lists"
            -o "Dir::Cache=$APT_ROOT/cache"
            -o "Dir::Cache::archives=$APT_ROOT/cache/archives"
            -o "Acquire::Retries=3"
          )

          apt-get "${APT_OPTS[@]}" update
          IMAGE_PKG="$(
            apt-cache "${APT_OPTS[@]}" -o "APT::Architecture=arm64" search '^linux-image-[0-9].*-generic$' \
              | awk '{print $1}' \
              | sort -V \
              | tail -n 1
          )"

          if [[ -z "$IMAGE_PKG" ]]; then
            echo "failed to resolve arm64 linux-image package from ports.ubuntu.com" >&2
            exit 1
          fi

          (
            cd "$APT_ROOT"
            apt-get "${APT_OPTS[@]}" -o "APT::Architecture=arm64" download "${IMAGE_PKG}:arm64"
          )

          KERNEL_DEB="$(ls -1 "$APT_ROOT"/"${IMAGE_PKG}"_*_arm64.deb | head -n 1)"
          echo "DRISHTI_QEMU_AARCH64_KERNEL_DEB=$KERNEL_DEB" >> "$GITHUB_ENV"
      - name: Run aarch64 QEMU CI lane
        env:
          DRISHTI_QEMU_BUILD_TOOL: cross
        run: cargo run -p xtask -- qemu ci --arch aarch64 --kvm off --timeout-secs 300
      - name: Upload aarch64 QEMU artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-aarch64-artifacts
          path: target/qemu/aarch64/
