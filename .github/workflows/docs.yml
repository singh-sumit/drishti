name: docs

on:
  pull_request:
    paths:
      - 'drishti-docs/**'
      - '.github/workflows/docs.yml'
      - 'README.md'
      - 'Justfile'
  push:
    branches:
      - main
    paths:
      - 'drishti-docs/**'
      - '.github/workflows/docs.yml'
      - 'README.md'
      - 'Justfile'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: drishti-docs/package-lock.json

      - name: Install deps
        working-directory: drishti-docs
        run: npm ci

      - name: Build docs
        working-directory: drishti-docs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: drishti-docs/build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
